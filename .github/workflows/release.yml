name: Release

on:
  push:
    branches:
      - main
      - develop
      - uat
    paths-ignore:
      - "CODEOWNERS"
      - "**.md"
      - ".**"

  pull_request:
    branches:
      - main
      - develop
      - uat
    types:
      - opened
      - synchronize
      - edited
    paths-ignore:
      - "CODEOWNERS"
      - "**.md"
      - ".**"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@dc12339a9823e6625f5410a45b24fcbc55a33ded #v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install dependencies
        run: |
          export YARN_ENABLE_SCRIPTS=false
          yarn install --ignore-scripts --immutable --check-cache

      - name: Jest Coverage Report
        uses: ArtiomTr/jest-coverage-report-action@82bc34a0347019ba8f6d2808cd96cec42ef9620e #v2.3.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          test-script: yarn test:coverage
          threshold: 90
          annotations: none
          package-manager: yarn

      - name: SonarQube Scan (PR Analysis)
        uses: SonarSource/sonarqube-scan-action@e9a1c4e09a5eddb7db5d045b83807904bf8f67fc #v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=${{ vars.SONARCLOUD_ORG }}
            -Dsonar.projectKey=${{ vars.SONARCLOUD_PROJECT_KEY }}
            -Dsonar.projectName="${{ vars.SONARCLOUD_PROJECT_NAME }}"
            -Dsonar.pullrequest.provider=github
            -Dsonar.pullrequest.github.repository=${{ github.repository }}
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.qualitygate.wait=true

     
